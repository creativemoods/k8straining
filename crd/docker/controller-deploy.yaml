apiVersion: apps/v1
kind: Deployment
metadata:
  name: cake-controller
  namespace: studentx
spec:
  replicas: 1
  selector:
    matchLabels: { app: cake-controller }
  template:
    metadata:
      labels: { app: cake-controller }
    spec:
      serviceAccountName: cake-controller
      imagePullSecrets:
      - name: sec-cmregistry
      containers:
        - name: controller
          image: registry.creativemoods.pt/studentx/cake-controller:latest
          args:
            # tell kopf to watch only *this* namespace
            - kopf
            - run
            - --standalone
            - --namespace=$(POD_NAMESPACE)
            - /app/cake_controller.py
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
