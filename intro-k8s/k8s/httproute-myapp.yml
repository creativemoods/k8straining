apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httproute-myapp-helloworld
  namespace: <###namespace###>
spec:
  parentRefs:
  - name: public-gateway
    namespace: nginx-gateway
  hostnames:
  - "<###host###>"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: svc-myapp-helloworld
      port: 80
